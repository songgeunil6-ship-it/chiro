<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaroqueWorks - 포켓몬고 소통팸</title>

  <style>
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      background-color: #FEE500;
      color: #191919;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .share-btn:hover { opacity: 0.85; }
    .share-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <h2>BaroqueWorks 공유하기</h2>
  <p>아래 버튼을 누르면 카카오톡으로 클랜 정보를 공유할 수 있어요.</p>

  <button id="kakaotalk-sharing-btn" class="share-btn">
    💬 카카오톡으로 공유하기
  </button>

  <!-- 카카오 SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
    crossorigin="anonymous"></script>

  <script>
    // [1] SDK 초기화 - 본인 JavaScript 키로 교체!
    Kakao.init('8c9884c005a409c251cc69646872714e');
    console.log('Kakao SDK 초기화:', Kakao.isInitialized());

    // [2] 공유 버튼 클릭 이벤트
    document.getElementById('kakaotalk-sharing-btn').addEventListener('click', function() {
      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: '포켓몬고 소통 클랜 𝔹𝕒𝕣𝕠𝕢𝕦𝕖𝕎𝕠𝕣𝕜𝕤',
          description: '현재 클랜 통합된 포고의 단 하나의 팸\n\n• 포거 거래판 중심 팸\n• 공지관리, 분쟁 정리등 진행\n• 티어표는 본 방에서만 발행\n• 티어표 준신용 이상시에만 대리 가능\n\n🌟 포거 인원 필수 참여팸 🌟\n✔️ 안전한 거래 원할시 필참 ✔️',
          // 👇 imgur 직접 링크
          imageUrl: 'https://i.imgur.com/9DzF1FY.png',
          link: {
            mobileWebUrl: 'https://open.kakao.com/o/gv02Nrhh',
            webUrl: 'https://open.kakao.com/o/gv02Nrhh',
          },
        },
        buttons: [
          {
            title: '오픈채팅 참여',
            link: {
              mobileWebUrl: 'https://open.kakao.com/o/gv02Nrhh',
              webUrl: 'https://open.kakao.com/o/gv02Nrhh',
            },
          },
        ],
      });
    });
  </script>

</body>
</html>
